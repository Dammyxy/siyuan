name: Build SiYuan Android files

on:
  workflow_dispatch:

jobs:
  build-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout siyuan
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: |
          corepack enable

      - name: Build app.zip
        working-directory: app
        run: |
          corepack install
          pnpm install
          pnpm run build:mobile || pnpm run build
          zip -r app.zip appearance guide stage changelogs

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.2.12479018" "platforms;android-35" "build-tools;35.0.0"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Init gomobile
        run: |
          gomobile init

      - name: Build kernel.aar
        working-directory: kernel
        run: |
          gomobile bind -tags fts5 -ldflags "-s -w" -v -o kernel.aar -target android/arm64 -androidapi 26 ./mobile/

      - name: Collect files
        run: |
          mkdir -p output
          cp app/app.zip output/app.zip
          cp kernel/kernel.aar output/kernel.aar
          ls -lh output

      - name: Upload files
        uses: actions/upload-artifact@v4
        with:
          name: siyuan-android-required-files
          path: output/
